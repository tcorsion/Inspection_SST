<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inspection</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<link rel="manifest" href="manifest.json">

<body>

  <h1>Point de contrôle</h1>

  <!-- Catégorie -->
  <h2 id="categorie"></h2>

  <!-- Intitulé -->
  <p id="intitule">Chargement…</p>

  <!-- Photo conforme (optionnelle) -->
  <div id="photoConformeBloc">
    <label>Photo (optionnelle)</label><br>
    <input
      type="file"
      id="photoConforme"
      accept="image/*"
      capture="environment"
    >
  </div>

  <br>

  <!-- Boutons -->
  <button onclick="conforme()">✅ Conforme</button>
  <button onclick="nonConforme()">❌ Non conforme</button>

  <!-- Bloc NON CONFORME -->
  <div id="nonConformeBloc" style="display:none; margin-top:20px;">
    <label>Commentaire (obligatoire)</label><br>
    <textarea id="commentaire" rows="4" cols="40"></textarea><br><br>

    <label>Photo (obligatoire)</label><br>
    <input
      type="file"
      id="photo"
      accept="image/*"
      capture="environment"
    ><br><br>

    <button onclick="validerNonConforme()">Valider et continuer</button>
  </div>

  <hr>

  <!-- PDF -->
  <button onclick="genererPDF()">📄 Générer le rapport PDF</button>

  <!-- Librairie PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Script de l’application -->
  <script src="app.js"></script>

</body>
</html>
