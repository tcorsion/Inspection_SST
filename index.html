<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application d'Inspection - Sous-Stations</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Charger les bibliothèques externes (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <!-- Load the idb library first -->
  <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
  <!-- Then load your application script -->
  <script src="app.js"></script>

</head>
<body>
  <!-- Overlay pour le menu -->
  <div id="overlay"></div>

  <!-- Menu latéral -->
  <nav id="menuLateral">
    <ul>
      <li data-view="controle">📋 Contrôle</li>
      <li data-view="archives">🗂 Archives</li>
    </ul>
  </nav>

  <!-- Bouton pour ouvrir le menu -->
  <button id="btnMenu" class="btn-menu">☰ Menu</button>

  <!-- Vue Contrôle -->
  <div id="vueControle">
    <h1>Inspection de Sous-Station</h1>

    <div class="form-group">
      <label for="nomSousStation">Nom de la sous-station :</label>
      <input type="text" id="nomSousStation" placeholder="Ex: Sous-station A">
    </div>

    <div class="form-group">
      <label for="remarquesGenerales">Remarques générales :</label>
      <textarea id="remarquesGenerales" rows="3" placeholder="Ajoutez des remarques générales ici..."></textarea>
    </div>

    <div id="progression-container">
      <div id="progression">Point 1 / 0</div>
      <progress id="progressBar" value="0" max="100"></progress>
    </div>

    <!-- Zone de contrôle avec hauteur fixe -->
    <div id="point-container" class="fixed-height-container">
      <h2 id="categorie">Catégorie</h2>
      <h3 id="intitule">Intitulé du point de contrôle</h3>
    </div>

    <div id="zoneObservation">
      <div class="form-group">
        <label for="commentaire">Commentaire :</label>
        <textarea id="commentaire" rows="3" placeholder="Ajoutez un commentaire si nécessaire..."></textarea>
      </div>
      <div class="form-group">
        <label for="photo">Photo (optionnelle) :</label>
        <input type="file" id="photo" accept="image/*" capture="environment">
      </div>
    </div>

    <!-- Boutons principaux (sur la même ligne) -->
    <div id="boutons-principaux">
      <button id="btnConforme" class="btn btn-vert">✅ Conforme</button>
      <button id="btnNonConforme" class="btn btn-rouge">❌ Non conforme</button>
    </div>

    <!-- Boutons secondaires (en colonne) -->
    <div id="boutons-secondaires">
      <button id="btnValiderNonConforme" class="btn btn-bleu" disabled>Valider Non Conforme</button>
      <button id="btnPdf" class="btn btn-bleu" disabled>📄 Générer PDF</button>
      <button id="btnNouvelleInspection" class="btn btn-vert" disabled>🆕 Nouvelle Inspection</button>
      <button id="btnRetour" class="btn btn-gris" disabled>← Retour</button>
    </div>
  </div>

  <!-- Vue Archives -->
  <div id="vueArchives" style="display: none;"></div>

</body>
</html>
