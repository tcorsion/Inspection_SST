<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Inspection terrain</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
</head>

<body>

  <h1>Contrôle checklist ELM</h1>
  <!-- Nom de la sous-station -->
  <div id="ligneSousStation">
    <label for="nomSousStation">Sous‑station : </label>
    <input
      type="text"
      id="nomSousStation"
      placeholder="Ex : SS Poste Nord"
    >
  </div>

  <!-- Progression -->
  <div id="progression"></div>
  <progress id="progressBar" value="0" max="100"></progress>

  <!-- Catégorie -->
  <h2 id="categorie"></h2>

  <!-- Bloc question -->
  <div id="blocPoint">
    <p id="intitule">Chargement…</p>
  </div>

<!-- Zone Commentaire / Photo -->
<div id="zoneObservation">
  <label id="labelCommentaire">Commentaire</label>
  <textarea id="commentaire" rows="4"
    placeholder="Observations, remarques…"></textarea>

  <label id="labelPhoto">Photo</label>
  <input
    type="file"
    id="photo"
    accept="image/*"
    capture="environment"
  >
</div>

<!-- Boutons Conforme / Non conforme -->
<div id="blocDecision">
  <button id="btnConforme" onclick="conforme()">✅<br>Conforme</button>
  <button id="btnNonConforme" onclick="nonConforme()">❌<br>Non conforme</button>
</div>

<!-- Validation Non conforme -->
<button
  id="btnValiderNonConforme"
  onclick="validerNonConforme()"
  disabled
>
  Valider et continuer
</button>

<!-- Navigation -->
<button id="btnRetour" onclick="retour()">⬅️ Précédent</button>

  <button id="btnPdf" onclick="genererPDF()" disabled>
    📄 Générer le rapport PDF
  </button>

  <button id="btnNouvelleInspection" onclick="nouvelleInspection()">
  🆕 Nouvelle inspection
  </button>

  <!-- Librairie PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

  <!-- Script application -->
  <script src="app.js"></script>
  

</body>
</html>
