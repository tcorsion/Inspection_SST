<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inspection terrain</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
</head>

<body>

  <h1>Point de contrôle</h1>

  <!-- Progression -->
  <div id="progression" style="font-weight:bold; margin-bottom:5px;"></div>
  <progress id="progressBar" value="0" max="100" style="width:100%;"></progress>

  <!-- Catégorie -->
  <h2 id="categorie"></h2>

  <!-- Intitulé -->
  <p id="intitule">Chargement…</p>

  <!-- Photo conforme -->
  <div id="photoConformeBloc">
    <label>Photo (optionnelle)</label><br>
    <input
      type="file"
      id="photoConforme"
      accept="image/*"
      capture="environment"
    >
  </div>

  <br>

  <!-- Actions -->
  <button id="btnRetour" onclick="retour()">⬅️ Précédent</button>
  <button id="btnConforme" onclick="conforme()">✅ Conforme</button>
  <button id="btnNonConforme" onclick="nonConforme()">❌ Non conforme</button>

  <br><br>

  <button id="btnPdf" onclick="genererPDF()" disabled>
    📄 Générer le rapport PDF
  </button>

  <button onclick="nouvelleInspection()">
    🆕 Nouvelle inspection
  </button>

  <!-- Bloc NON CONFORME -->
  <div id="nonConformeBloc" style="display:none; margin-top:20px;">
    <label>Commentaire (obligatoire)</label><br>
    <textarea id="commentaire" rows="4" cols="40"></textarea><br><br>

    <label>Photo (obligatoire)</label><br>
    <input
      type="file"
      id="photo"
      accept="image/*"
      capture="environment"
    ><br><br>

    <button onclick="validerNonConforme()">Valider et continuer</button>
  </div>
