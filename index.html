<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspection terrain</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
</head>

<body>

  <h1>Point de contrôle</h1>

  <!-- Progression -->
  <div id="progression"></div>
  <progress id="progressBar" value="0" max="100"></progress>

  <!-- Catégorie -->
  <h2 id="categorie"></h2>

  <!-- Intitulé -->
  <p id="intitule">Chargement…</p>

  <!-- Photo conforme -->
  <div id="photoConformeBloc">
    <label>Photo (optionnelle)</label>
    <input
      type="file"
      id="photoConforme"
      accept="image/*"
      capture="environment"
    >
  </div>

  <!-- Boutons actions -->
  <button id="btnRetour" onclick="retour()">⬅️ Précédent</button>
  <button id="btnConforme" onclick="conforme()">✅ Conforme</button>
  <button id="btnNonConforme" onclick="nonConforme()">❌ Non conforme</button>

  <button id="btnPdf" onclick="genererPDF()" disabled>
    📄 Générer le rapport PDF
  </button>

  <button onclick="nouvelleInspection()">
    🆕 Nouvelle inspection
  </button>

  <!-- Bloc NON CONFORME -->
  <div id="nonConformeBloc">
    <label>Commentaire (obligatoire)</label>
    <textarea id="commentaire" rows="4"></textarea>

    <label>Photo (obligatoire)</label>
    <input
      type="file"
      id="photo"
      accept="image/*"
      capture="environment"
    >

    <button onclick="validerNonConforme()">Valider et continuer</button>
  </div>

  <!-- Librairie PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Script application -->
  <script src="app.js"></script>

</body>
</html>
